Description: Downloads the latest release of BrightAuthorConnected x64 from BrightSign.
Identifier: com.github.NickETH.recipes.download.BrightAuthorConnected-Win64
MinimumVersion: 1.3.1

Input:
  NAME: BrightAuthorConnected
  VENDOR: 'BrightSign'
  PLATFORM: x64
  PF_STRING: _64
  SEARCH_URL: https://docs.brightsign.biz/releases/latest
  #"href":"https://downloads.bsn.cloud/BA+connected+Setup+1.85.0.exe"
  REGEX: '"href":"(https:\/\/downloads\.bsn\.cloud\/BA\+connected\+Setup\+(?P<version>([0-9]+\.)*[0-9]+)\.exe)"'
 
  # From FF: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:134.0) Gecko/20100101 Firefox/134.0
  USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:134.0) like Gecko

Process:
- Processor: URLTextSearcher
  Comment: Get the exact path from the download page.
  Arguments:
    re_pattern: '%REGEX%'
    request_headers:
      user-agent: '%USER_AGENT%'
    url: '%SEARCH_URL%'

- Processor: URLDownloader
  Arguments:
    filename: '%NAME%_%PLATFORM%.exe'
    request_headers:
      user-agent: '%USER_AGENT%'
      referer: '%match%'
    url: '%match%'


- Processor: StopProcessingIf
  Arguments:
    predicate: download_changed == False

- Processor: WindowsSignatureVerifier
  Comment: Check the signature on the downloaded file
  Arguments:
    MAIN_PATH: '%pathname%'
    expected_subject: CN=BrightSign LLC, O=BrightSign LLC, L=Los Gatos, S=California, C=US, SERIALNUMBER=4840072, OID.2.5.4.15=Private Organization, OID.1.3.6.1.4.1.311.60.2.1.2=Delaware, OID.1.3.6.1.4.1.311.60.2.1.3=US
    input_path: '%pathname%'

- Processor: EndOfCheckPhase
