Description: Downloads the latest release of TurboVNC x64 from Github.
Identifier: com.github.NickETH.recipes.download.TurboVNC-Win64
MinimumVersion: 1.3.1

Input:
  NAME: TurboVNC
  VENDOR: turbovnc.org
  ASSET_REGEX: 'teraterm-.*?-x64\.exe'
  ASSET_REGEX: 'TurboVNC-.*?\.exe'
  PLATFORM: x64
  PF_STRING: _64

Process:
- Processor: GitHubReleasesInfoProvider
  Arguments:
    asset_regex: '%ASSET_REGEX%'
    # https://github.com/TurboVNC/turbovnc/releases
    # https://github.com/TurboVNC/turbovnc/releases/download/3.3/TurboVNC-3.3.exe
    github_repo: TurboVNC/turbovnc
    include_prereleases: false

- Processor: URLDownloader
  Arguments:
    filename: '%NAME%_%PLATFORM%.exe'

- Processor: StopProcessingIf
  Arguments:
    predicate: download_changed == False

# - Processor: com.github.sebtomasi.SharedProcessors/TextSubstituer
  # Comment: Generate the final version string.
  # Arguments:
    # input_string: '%version%'
    # pattern_replace:
    # - pattern: 'release-'
      # repl: ''

- Processor: WindowsSignatureVerifier
  Arguments:
    expected_subject: CN=SignPath Foundation, O=SignPath Foundation, L=Lewes, S=Delaware, C=US
    input_path: '%pathname%'
    
- Processor: EndOfCheckPhase
  # Arguments:
    # version: '%parsed_string%'
