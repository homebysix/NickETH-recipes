Description: Downloads the latest release of Mattermost x64 from Github.
Identifier: com.github.NickETH.recipes.download.Mattermost-Win64
MinimumVersion: 1.3.1

Input:
  NAME: Mattermost
  ASSET_REGEX: 'mattermost-desktop-.*?-win-x64\.msi'
  PLATFORM: x64
  PF_STRING: _64

Process:
- Processor: GitHubReleasesInfoProvider
  Arguments:
    asset_regex: '%ASSET_REGEX%'
    # https://github.com/mattermost/desktop/releases/download/v6.1.2/mattermost-desktop-6.1.2-win-x64.msi
    github_repo: mattermost/desktop
    include_prereleases: false

- Processor: URLDownloader
  Arguments:
    filename: '%NAME%_%PLATFORM%.msi'

- Processor: StopProcessingIf
  Arguments:
    predicate: download_changed == False

- Processor: WindowsSignatureVerifier
  Arguments:
    expected_subject: CN="Mattermost, Inc.", O="Mattermost, Inc.", L=Palo Alto, S=California, C=US
    input_path: '%pathname%'
    
- Processor: EndOfCheckPhase

