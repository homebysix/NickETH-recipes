Description: Downloads latest Dropbox Offline Installer for Windows.
Identifier: com.github.NickETH.recipes.download.DropboxClient-WinMSI
MinimumVersion: 1.3.1

Input:
  NAME: DropboxClient
  PLATFORM: win
  ARCH: x86
  DOWNLOAD_URL: https://client.dropbox.com/desktop/desktop-dropbox/requestdownload?install_type=enterprise_install&amp;platform=%PLATFORM%&amp;arch=%ARCH%

Process:
- Processor: URLDownloader
  Arguments:
    filename: '%NAME%.msi'
    url: '%DOWNLOAD_URL%'

- Processor: StopProcessingIf
  Arguments:
    predicate: download_changed == False

- Processor: com.github.NickETH.recipes.SharedProcessors/MSIRunSQLget
  Arguments:
    SQL_command: SELECT `Target` FROM `CustomAction` WHERE `Action`='SetUpdateDisplayVersionProperty'
    msi_path: '%pathname%'


- Processor: WindowsSignatureVerifier
  Arguments:
    version: '%msi_value%'
    expected_subject: CN="Dropbox, Inc", O="Dropbox, Inc", L=San Francisco, S=California, C=US
    input_path: '%pathname%'

- Processor: EndOfCheckPhase
