Description: Check for the latest SysInternals SysMon.
Identifier: com.github.NickETH.recipes.download.SysMon-Win
MinimumVersion: 1.3.1

Input:
  NAME: SysMon
  VENDOR: 'Microsoft'
  SEARCH_FIRSTURL: https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
  # <h1 id="sysmon-v152">Sysmon v15.2</h1>
  ASSET_REGEX: 'id="sysmon-.*?Sysmon.v(?P<version>([0-9]+\.)*[0-9]+)</h1>'
  PLATFORM: x86
  PF_STRING: ''
  LANG_STRING: _ML
  # USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:81.0) Gecko/20100101 Firefox/81.0

Process:
- Processor: URLDownloader
  Arguments:
    filename: '%NAME%.zip'
    url: 'https://download.sysinternals.com/files/Sysmon.zip'

- Processor: URLTextSearcher
  Arguments:
    re_pattern: '%ASSET_REGEX%'
    # re_flags:
    # - DOTALL
    url: '%SEARCH_FIRSTURL%'

- Processor: com.github.NickETH.recipes.SharedProcessors/ExecuteFile
  Comment: create a version.txt file, if it does not exist (like 'touch').
  Arguments:
    cmdline_args:
    - /C
    - type
    - nul
    - '>>'
    - version.txt
    exe_file: 'cmd.exe'
    exe_folder: '%RECIPE_CACHE_DIR%'

- Processor: URLTextSearcher
  Comment: read back the previous version from the version.txt file.
  Arguments:
    re_pattern: '^(.*)$'
    url: file://%RECIPE_CACHE_DIR%/version.txt

- Processor: StopProcessingIf
  Arguments:
    predicate: '%version% == %match%'

- Processor: FileCreator
  Comment: Generate the version.txt in the release dir.
  Arguments:
    #version: '%MAJORVER%.%versionsub%'
    file_content: '%version%'
    file_path: '%RECIPE_CACHE_DIR%\version.txt'


- Processor: URLDownloader
  Arguments:
    filename: 'SwiftOnSecurity.xml'
    url: 'https://raw.githubusercontent.com/SwiftOnSecurity/sysmon-config/refs/heads/master/sysmonconfig-export.xml'

# - Processor: WindowsSignatureVerifier
  # Arguments:
    # expected_subject: CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US
    # input_path: '%pathname%'

- Processor: EndOfCheckPhase
